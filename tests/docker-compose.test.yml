# StreamHouse E2E Test Infrastructure
# Provides Postgres and MinIO for tests — no StreamHouse server (that runs natively).
#
# Usage:
#   docker compose -f tests/docker-compose.test.yml up -d --wait
#   docker compose -f tests/docker-compose.test.yml down -v
#
# Ports are configurable via env vars to avoid conflicts:
#   TEST_PG_PORT=5433 TEST_MINIO_PORT=9100 docker compose -f tests/docker-compose.test.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: streamhouse
      POSTGRES_PASSWORD: streamhouse
      POSTGRES_DB: streamhouse_test
    ports:
      - "${TEST_PG_PORT:-5433}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamhouse"]
      interval: 2s
      timeout: 2s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${TEST_MINIO_PORT:-9100}:9000"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 10
