name: CI

on:
  push:
    branches: [develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_call:
  schedule:
    - cron: "0 0 * * 0" # Weekly security audit

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  # Use sparse registry for faster index updates
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  # Super fast pre-check - fail in <1 minute if formatting is wrong
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # Main build + test job - shares compilation artifacts
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: fmt
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold protobuf-compiler

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          save-if: "true"

      # Step 1: Clippy (compiles in check mode)
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      # Step 2: Build for tests (reuses some artifacts from clippy)
      - name: Build workspace
        run: cargo build --workspace --locked

      # Step 3: Run tests (reuses build artifacts)
      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace --locked --retries 2

      # Step 4: Rust E2E tests (in-memory SQLite, no external services needed)
      - name: Run Rust E2E tests
        run: cargo nextest run --locked -p streamhouse-e2e --retries 2

      # Only run doctests on main/PRs to main (slower, less critical)
      - name: Run doctests
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
        run: cargo test --workspace --doc --locked

  # E2E tests with Postgres + MinIO service containers
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      TEST_BACKEND: postgres-s3
      TEST_DATABASE_URL: postgres://streamhouse:streamhouse@localhost:5432/streamhouse_test
      TEST_S3_ENDPOINT: http://localhost:9000
      TEST_S3_BUCKET: streamhouse-test
      TEST_AWS_ACCESS_KEY_ID: minioadmin
      TEST_AWS_SECRET_ACCESS_KEY: minioadmin
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: streamhouse
          POSTGRES_PASSWORD: streamhouse
          POSTGRES_DB: streamhouse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold protobuf-compiler

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          save-if: "false"

      - name: Install grpcurl
        run: |
          GRPCURL_VERSION="1.9.1"
          curl -sSL "https://github.com/fullstorydev/grpcurl/releases/download/v${GRPCURL_VERSION}/grpcurl_${GRPCURL_VERSION}_linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin grpcurl

      - name: Install kcat
        run: sudo apt-get install -y kafkacat || sudo apt-get install -y kcat || true

      - name: Create MinIO test bucket
        run: |
          curl -sf -X PUT "http://localhost:9000/${TEST_S3_BUCKET}" \
            -u "${TEST_AWS_ACCESS_KEY_ID}:${TEST_AWS_SECRET_ACCESS_KEY}" || true

      - name: Build server with postgres feature
        run: |
          cargo build --profile test-release -p streamhouse-server --bin unified-server \
            --features postgres --locked

      - name: Build CLI
        run: |
          cargo build --profile test-release -p streamhouse-cli --bin streamctl --locked || true

      - name: Run E2E tests
        run: |
          chmod +x ./tests/run-all.sh
          ./tests/run-all.sh --backend postgres-s3 --ci

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-log
          path: /tmp/streamhouse-test-*/server.log
          retention-days: 7
          if-no-files-found: ignore

  # Coverage only on main or PRs to main
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    needs: build-and-test
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold protobuf-compiler

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          save-if: "false"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --locked --codecov --output-path codecov.json

      - name: Coverage summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cargo llvm-cov --workspace --locked --summary-only 2>&1 | tail -n +2 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Security audit - only on main, PRs, or scheduled
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo audit
        uses: actions-rust-lang/audit@v1
        with:
          deny-warnings: false
          create-issues: false
          ignore: RUSTSEC-2023-0071,RUSTSEC-2024-0334,RUSTSEC-2024-0384,RUSTSEC-2024-0436,RUSTSEC-2025-0134

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run cargo deny
        run: |
          cargo deny check advisories
          cargo deny check licenses
          cargo deny check bans

  # Benchmarks - save baseline on main, compare on PRs
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: build-and-test
    permissions:
      pull-requests: write
      contents: write
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold protobuf-compiler

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          save-if: "false"

      - name: Run benchmarks
        run: cargo bench --workspace --locked -- --output-format bencher 2>&1 | tee benchmark-results.txt

      - name: Benchmark summary
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "^test " benchmark-results.txt | sed 's/test //' | column -t >> $GITHUB_STEP_SUMMARY || cat benchmark-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Compare benchmarks
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: benchmark-results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Store baseline in gh-pages branch
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          # On PRs: comment with comparison table, fail if >15% regression
          comment-on-alert: true
          alert-threshold: "115%"
          fail-on-alert: ${{ github.event_name == 'pull_request' }}
          alert-comment-cc-users: "@${{ github.actor }}"
          # Only save baseline from main branch
          save-data-file: ${{ github.ref == 'refs/heads/main' }}

  # Summary job - require only essential jobs to pass
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    if: always()
    needs: [fmt, build-and-test]
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.fmt.result }}" != "success" ] || [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "Required checks failed"
            exit 1
          fi
          echo "All required checks passed!"
