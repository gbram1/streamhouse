name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run security audit weekly
    - cron: '0 0 * * 0'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  # Fast checks first - fail fast
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold protobuf-compiler

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-ubuntu"

      # Format check (fastest, no compilation)
      - name: Check formatting
        run: cargo fmt --all -- --check

      # Clippy check (compiles in check mode)
      - name: Clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold protobuf-compiler

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-ubuntu"

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      # Run tests (reuses cache from clippy job)
      - name: Run tests
        run: cargo nextest run --workspace --all-features --retries 2

      - name: Run doctests
        run: cargo test --workspace --doc --all-features

  # Coverage only on main branch or PRs to main (expensive)
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold protobuf-compiler

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-ubuntu"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-features --codecov --output-path codecov.json

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: codecov.json
          retention-days: 14

      - name: Coverage summary
        run: |
          COVERAGE=$(cargo llvm-cov --workspace --all-features --summary-only 2>&1 | grep 'TOTAL' | awk '{print $NF}' | tr -d '%' || echo "0")
          echo "Total coverage: ${COVERAGE}%"
          echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT
        id: coverage

  # Security audit only on main, PRs to main, or weekly schedule
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run cargo audit
        uses: actions-rust-lang/audit@v1
        with:
          # Don't fail on warnings, only actual vulnerabilities
          deny-warnings: false

      - name: Run cargo deny (advisories)
        run: cargo deny check advisories

      - name: Run cargo deny (licenses)
        run: cargo deny check licenses

      - name: Run cargo deny (bans)
        run: cargo deny check bans

  # Benchmarks only on PRs (not every push)
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: check
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold protobuf-compiler

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-ubuntu"

      - name: Run benchmarks
        run: cargo bench --workspace --no-fail-fast -- --output-format bencher 2>&1 | tee benchmark-results.txt || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 14

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold protobuf-compiler

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-ubuntu"

      - name: Build release
        run: cargo build --workspace --release

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            target/release/unified-server
            target/release/standalone-agent
            target/release/streamctl
          retention-days: 7
