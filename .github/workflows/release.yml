name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gbram1/streamhouse

permissions:
  contents: write
  packages: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # --- Docker image with semver tags ---
  docker:
    name: Docker Release
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Cross-platform CLI binaries ---
  cli:
    name: CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: ci
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: streamctl-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: streamctl-darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: streamctl-darwin-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Build streamctl
        run: cargo build --release --locked --bin streamctl

      - name: Rename binary
        run: cp target/release/streamctl ${{ matrix.artifact }}

      - name: Generate checksum
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  # --- GitHub Release with CLI binaries ---
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, cli]
    steps:
      - uses: actions/checkout@v4

      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: streamctl-*
          merge-multiple: true

      - name: Create checksums file
        run: cat artifacts/*.sha256 > artifacts/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/streamctl-linux-amd64
            artifacts/streamctl-darwin-arm64
            artifacts/streamctl-darwin-amd64
            artifacts/checksums.txt

  # --- Dispatch deploy ---
  dispatch:
    name: Dispatch Deploy
    runs-on: ubuntu-latest
    needs: [docker, cli]
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Trigger streamhouse-platform deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
          repository: gbram1/streamhouse-platform
          event-type: deploy
          client-payload: |
            {
              "image": "ghcr.io/gbram1/streamhouse:${{ steps.version.outputs.version }}",
              "sha": "${{ github.sha }}"
            }
