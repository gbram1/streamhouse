name: Docker Publish (Dev)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gbram1/streamhouse

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=main-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dispatch:
    name: Dispatch Dev Deploy
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Trigger streamhouse-platform deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
          repository: gbram1/streamhouse-platform
          event-type: deploy
          client-payload: |
            {
              "image": "ghcr.io/gbram1/streamhouse:dev",
              "sha": "${{ github.sha }}"
            }
