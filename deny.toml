# cargo-deny configuration for StreamHouse
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

# Advisories — check for known vulnerabilities
[advisories]
ignore = [
    # rsa: Marvin Attack - no fix available, transitive from sqlx-mysql
    "RUSTSEC-2023-0071",
    # bincode: unmaintained - migration to v2 requires data format changes
    "RUSTSEC-2024-0334",
    # instant: unmaintained - transitive from datafusion 43
    "RUSTSEC-2024-0384",
    # paste: unmaintained - transitive from datafusion 43
    "RUSTSEC-2024-0436",
    # rustls-pemfile: unmaintained - transitive from axum-server
    "RUSTSEC-2025-0134",
]

# Licenses — ensure all dependencies use acceptable licenses
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "MPL-2.0",
    "BSL-1.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# Bans — prevent problematic dependencies
[bans]
multiple-versions = "warn"
wildcards = "allow"

# Sources — only allow crates from crates.io
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
